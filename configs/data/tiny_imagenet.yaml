schema_version: 1
dataset_name: tiny-imagenet
dataset_version: v1
task: classification
seed: 42

source:
  provider: Stanford CS231n Tiny ImageNet challenge material
  archive:
    url: https://cs231n.stanford.edu/tiny-imagenet-200.zip
    filename: tiny-imagenet-200.zip
    extracted_directory: tiny-imagenet-200

split_policy:
  status: pending
  strategy: null
  note: Split counts and the deterministic splitting algorithm will be decided before manifest generation.

manifests:
  directory: data/manifests/tiny-imagenet/v1
  training: train.jsonl
  validation: validation.jsonl
  calibration: calibration.jsonl
  test: test.jsonl
  include_fields:
    - sample_id
    - relative_path
    - class_id
    - source_split

invariants:
  expected_classes: 200
  validation_labels_source: val_annotations.txt
  fail_on_corrupt_image: true
  fail_on_unknown_label: true
