schema_version: 1
dataset_name: coco-2017
dataset_version: v1
task: detection
seed: 42

source:
  provider: COCO Consortium
  archives:
    images:
      url: https://images.cocodataset.org/zips/val2017.zip
      filename: val2017.zip
      extracted_directory: val2017
    annotations:
      url: https://images.cocodataset.org/annotations/annotations_trainval2017.zip
      filename: annotations_trainval2017.zip
      extracted_directory: annotations

split_policy:
  status: approved
  strategy: seeded_stable_hash_of_image_id
  calibration:
    source: val2017
    target_count: 500
  validation:
    source: val2017
    target_count: 1000
  test:
    source: val2017
    target_count: 3500

manifests:
  directory: data/manifests/coco-2017/v1
  training: null
  training_manifest_behavior: not_generated_for_initial_pretrained_baseline
  validation: validation.jsonl
  calibration: calibration.jsonl
  test: test.jsonl
  include_fields:
    - sample_id
    - coco_image_id
    - relative_path
    - annotation_ids

invariants:
  expected_categories: 80
  preserve_original_category_ids: true
  preserve_original_annotations: true
  fail_on_missing_annotation_record: true
  allow_empty_annotation_list: true
  fail_on_invalid_box: true
