schema_version: 1
dataset_name: similarity-gallery
dataset_version: v1
task: similarity
seed: 42

source:
  provider: ImageNet sample images repository
  archive:
    url: https://github.com/EliSchwartz/imagenet-sample-images/archive/refs/heads/master.zip
    filename: imagenet-sample-images.zip
    extracted_directory: imagenet-sample-images

split_policy:
  status: pending
  strategy: null
  note: Calibration, query, and gallery counts and their deterministic assignment algorithm will be decided before manifest generation.

ground_truth:
  format: explicit_positive_pairs
  positive_pair_source: deterministic_query_transformations
  minimum_positives_per_query: 1
  minimum_gallery_positives_per_test_query: 1

manifests:
  directory: data/manifests/similarity-gallery/v1
  training: null
  training_manifest_behavior: not_generated_for_initial_pretrained_encoder
  calibration: calibration.jsonl
  test_queries: test_queries.jsonl
  gallery: gallery.jsonl
  positive_pairs: positive_pairs.jsonl
  include_fields:
    - sample_id
    - relative_path

invariants:
  every_test_query_requires_gallery_positive: true
  minimum_gallery_positives_per_test_query: 1
  query_and_gallery_paths_must_differ: true
