schema_version: 1
task: classification

identity:
  model_name: efficientnet-b0
  semantic_version: 0.1.0
  lifecycle_state: experiment

implementation:
  provider: torchvision
  entrypoint: torchvision.models.efficientnet_b0
  source_url: https://github.com/pytorch/vision
  source_revision: null
  code_license: BSD-3-Clause

pretrained_weights:
  identifier: EfficientNet_B0_Weights.IMAGENET1K_V1
  source_url: null
  sha256: null
  license_review_status: pending
  missing_integrity_or_license_behavior: block_candidate_registration

data:
  config: configs/data/tiny_imagenet.yaml
  dataset_name: tiny-imagenet
  number_of_classes: 200

training:
  decision: fine_tune
  execution_location: google_colab
  device: cuda
  automatic_mixed_precision: true
  seed: 42
  selection_metric: top1_accuracy
  checkpoint_resume_requires_matching_hashes:
    - git_sha
    - config
    - dataset_manifest

input:
  tensor_name: images
  dtype: float32
  layout: NCHW
  color_mode: RGB
  shape: [null, 3, 224, 224]

serving_preprocessing:
  exif_orientation: normalize
  resize_shorter_side: 256
  center_crop: [224, 224]
  interpolation: bicubic
  scale_to_unit_interval: true
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

output:
  tensor_name: logits
  raw_tensor_schema: class_logits
  api_response_schema: ranked_class_probabilities
  api_postprocessing: softmax_then_descending_top_k

export:
  portable_format: onnx
  opset: 18
  dynamic_axes:
    batch: true
    spatial: false
  target_profiles:
    - local_cpu
    - gpu_onnx
    - gpu_tensorrt

quantization:
  candidate: static_int8
  calibration_manifest: data/manifests/tiny-imagenet/v1/calibration.jsonl
  promotion_gate: configs/acceptance.yaml
